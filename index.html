<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Calculator</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <!-- Write your markup here -->
     <main>
      <h1>Change Calculator</h1>
      <div class ="input-container">
        <div class="due-container">
          <label for="amount-due">Amount Due:</label>
          <input type="number" id="amount-due" placeholder="Amount Due">
        </div>

        <div class="received-container">
          <label for="amount-received">Amount Received:</label>
          <input type="number" id="amount-received" placeholder="Amount Received">
        </div>
      </div>

        <button id="calculate-change" onclick="calculateChange()">Calculate</button>

      <div class="output"> 
        <p>Dollars: <span id="dollars-output">0</span></p>
        <p>Quarters: <span id="quarters-output">0</span></p>
        <p>Dimes: <span id="dimes-output">0</span></p>
        <p>Nickels: <span id="nickels-output">0</span></p>
        <p>Pennies: <span id="pennies-output">0</span></p>
      </div>
     </main>

    <!-- Don't forget to add your <script> tag here -->
    <script src="main.js"></script>
  </body>
</html>
